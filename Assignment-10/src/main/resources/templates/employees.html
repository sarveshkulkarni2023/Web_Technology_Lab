<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management - TaskPro</title>
    <link rel="stylesheet" href="/api/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container-fluid">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-tasks"></i> TaskPro</h2>
                <p class="subtitle">Management System</p>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li><a href="/api/index.html" class="nav-link"><i class="fas fa-chart-line"></i> Dashboard</a></li>
                    <li><a href="/api/employees.html" class="nav-link active"><i class="fas fa-users"></i> Employees</a></li>
                    <li><a href="/api/tasks.html" class="nav-link"><i class="fas fa-list-check"></i> Tasks</a></li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <p>&copy; 2024 TaskPro</p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="top-header">
                <div class="header-left">
                    <h1>Employee Management</h1>
                </div>
                <div class="header-right">
                    <button class="btn btn-primary" onclick="openAddEmployeeModal()">
                        <i class="fas fa-plus"></i> Add Employee
                    </button>
                </div>
            </header>

            <!-- Content Area -->
            <div class="content-wrapper">
                <!-- Filters and Search -->
                <div class="filters-section">
                    <div class="search-bar">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search-input" placeholder="Search by name or email..." 
                               onkeyup="debounceSearch(this.value)">
                    </div>
                    <div class="filter-group">
                        <select id="department-filter" onchange="filterByDepartment(this.value)">
                            <option value="">All Departments</option>
                        </select>
                    </div>
                </div>

                <!-- Employees Table -->
                <div class="card">
                    <div class="card-header">
                        <h2>Employees</h2>
                        <div class="table-info">
                            <span>Total: <strong id="employee-count">0</strong></span>
                        </div>
                    </div>
                    <div class="card-content">
                        <div class="table-responsive">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Email</th>
                                        <th>Department</th>
                                        <th>Tasks</th>
                                        <th>Role</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="employees-tbody">
                                    <tr>
                                        <td colspan="6" class="text-center">Loading...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <!-- Pagination -->
                        <div class="pagination" id="pagination">
                            <!-- Pagination buttons will be added here -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Employee Modal -->
    <div id="employee-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Add Employee</h2>
                <button class="close-btn" onclick="closeEmployeeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="employee-form">
                    <div class="form-group">
                        <label for="employee-name">Name *</label>
                        <input type="text" id="employee-name" required>
                        <span class="error-message" id="name-error"></span>
                    </div>

                    <div class="form-group">
                        <label for="employee-email">Email *</label>
                        <input type="email" id="employee-email" required>
                        <span class="error-message" id="email-error"></span>
                    </div>

                    <div class="form-group">
                        <label for="employee-department">Department *</label>
                        <input type="text" id="employee-department" required>
                        <span class="error-message" id="department-error"></span>
                    </div>

                    <div class="modal-actions">
                        <button type="submit" class="btn btn-primary">Save</button>
                        <button type="button" class="btn btn-secondary" onclick="closeEmployeeModal()">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Employee Details Modal -->
    <div id="employee-details-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Employee Details</h2>
                <button class="close-btn" onclick="closeDetailsModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="employee-details-content" id="employee-details-content">
                    <!-- Details will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script src="/api/js/app.js"></script>
    <script src="/api/js/employees.js"></script>
</body>
</html>
